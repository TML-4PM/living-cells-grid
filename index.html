<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Living Cells — Operating Grid</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e17;color:#e2e8f0;font-family:'IBM Plex Sans',-apple-system,sans-serif;min-height:100vh}.mono{font-family:'JetBrains Mono',monospace}.loading{display:flex;align-items:center;justify-content:center;height:100vh;gap:8px;font-size:13px;color:#64748b}.dot{width:6px;height:6px;border-radius:50%;background:#3b82f6;animation:p 1s ease-in-out infinite}.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}@keyframes p{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}.pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}.sev-critical{background:rgba(220,38,38,.2);color:#f87171;border:1px solid rgba(220,38,38,.3)}.sev-high{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}.sev-warning{background:rgba(234,179,8,.12);color:#facc15;border:1px solid rgba(234,179,8,.2)}.sev-info{background:rgba(14,165,233,.1);color:#38bdf8;border:1px solid rgba(14,165,233,.2)}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback}=React;
const FUNCTIONS=['Sense','Understand','Decide','Act','Verify','Secure','Coordinate','Improve','Govern'];
const DOMAINS=['Self','Family','Team','Org','Market','Government & Society','Infrastructure','Environment','Future'];
const DOMAIN_SHORT=['Self','Family','Team','Org','Market','Gov&Soc','Infra','Environ','Future'];
const API='/api/query?q=';const EVENT_API='/api/event';
async function fetchQ(key){const r=await fetch(API+key);const d=await r.json();return d.rows||[]}
async function postEvent(ev){const r=await fetch(EVENT_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(ev)});return r.json()}
async function resolveEvent(id,actor){const r=await fetch(`${EVENT_API}?resolve=${id}&actor=${encodeURIComponent(actor)}`);return r.json()}
const riskColor=r=>r==='Critical'?{bg:'#dc2626',t:'#fff',g:'rgba(220,38,38,.4)'}:r==='High'?{bg:'#f59e0b',t:'#000',g:'rgba(245,158,11,.3)'}:{bg:'#0ea5e9',t:'#fff',g:'rgba(14,165,233,.2)'};
function Stat({label,value,color,sub}){return <div style={{textAlign:'center',padding:'12px 14px',background:'rgba(255,255,255,.03)',borderRadius:8,border:'1px solid rgba(255,255,255,.06)',minWidth:90}}><div className="mono" style={{fontSize:26,fontWeight:700,color}}>{value}</div><div style={{fontSize:10,color:'#94a3b8',marginTop:3,textTransform:'uppercase',letterSpacing:'.05em'}}>{label}</div>{sub&&<div style={{fontSize:10,color:'#64748b',marginTop:2}}>{sub}</div>}</div>}
function App(){const[cells,setCells]=useState([]),[stats,setStats]=useState({}),[domainHealth,setDomainHealth]=useState([]),[researchCov,setResearchCov]=useState([]),[alerts,setAlerts]=useState([]),[feed,setFeed]=useState([]),[stale,setStale]=useState([]),[operational,setOperational]=useState([]),[studyLinks,setStudyLinks]=useState([]),[selected,setSelected]=useState(null),[view,setView]=useState('grid'),[filter,setFilter]=useState('all'),[loading,setLoading]=useState(true),[lastRefresh,setLastRefresh]=useState(null);
const load=useCallback(async()=>{setLoading(true);try{const[c,s,dh,rc,al,fd,st,op,sl]=await Promise.all([fetchQ('all_cells'),fetchQ('stats'),fetchQ('domain_health'),fetchQ('research_coverage'),fetchQ('alerts'),fetchQ('feed'),fetchQ('stale'),fetchQ('operational'),fetchQ('study_links')]);setCells(c);setStats(Array.isArray(s)?s[0]||{}:s);setDomainHealth(dh);setResearchCov(rc);setAlerts(al);setFeed(fd);setStale(st);setOperational(op);setStudyLinks(sl);setLastRefresh(new Date())}catch(e){console.error(e)}setLoading(false)},[]);useEffect(()=>{load()},[load]);
const cellMap=useMemo(()=>{const m={};cells.forEach(c=>{m[`${c.function_name}|${c.domain_name}`]=c});return m},[cells]);
const filtered=useMemo(()=>{if(filter==='all')return cells;if(filter==='critical')return cells.filter(c=>c.risk_classification==='Critical');if(filter==='high')return cells.filter(c=>c.risk_classification==='High'||c.risk_classification==='Critical');if(filter==='auto')return cells.filter(c=>c.automation_flag);if(filter==='manual')return cells.filter(c=>!c.automation_flag);if(filter==='alert')return cells.filter(c=>c.alert_active);return cells},[cells,filter]);
const handleResolve=async(eventId)=>{await resolveEvent(eventId,'Troy');load()};const handleLogEvent=async(cellId,type,sev,title)=>{await postEvent({cell_id:cellId,event_type:type,severity:sev,title,actor:'Troy',source:'dashboard'});load()};const s=stats;const VIEWS=['grid','alerts','feed','stale','operational','domains','research','risk'];
return <div style={{padding:'20px 24px',maxWidth:1480,margin:'0 auto'}}><div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}><div><h1 style={{fontSize:22,fontWeight:700,letterSpacing:'-.02em'}}>Living Cells</h1><p style={{fontSize:12,color:'#64748b',marginTop:3}}>9×9 Operating Grid{lastRefresh&&<span style={{marginLeft:10,fontSize:11}}>⟳ {lastRefresh.toLocaleTimeString()}</span>}</p></div><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{VIEWS.map(v=><button key={v} onClick={()=>setView(v)} style={{padding:'5px 12px',borderRadius:5,border:'1px solid',fontSize:11,fontWeight:600,cursor:'pointer',textTransform:'capitalize',borderColor:view===v?'#3b82f6':'rgba(255,255,255,.08)',background:view===v?'rgba(59,130,246,.15)':'transparent',color:view===v?'#60a5fa':'#94a3b8'}}>{v}{v==='alerts'&&alerts.length>0?` (${alerts.length})`:''}{v==='stale'&&stale.length>0?` (${stale.length})`:''}</button>)}<button onClick={load} disabled={loading} style={{padding:'5px 10px',borderRadius:5,border:'1px solid rgba(255,255,255,.08)',fontSize:11,cursor:'pointer',background:'transparent',color:loading?'#475569':'#94a3b8'}}>↻</button></div></div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:6,marginBottom:20}}><Stat label="Cells" value={s.total_cells||cells.length||81} color="#e2e8f0"/><Stat label="Critical" value={s.critical||0} color="#dc2626"/><Stat label="High" value={s.high||0} color="#f59e0b"/><Stat label="Auto %" value={s.auto_pct?s.auto_pct+'%':'—'} color="#10b981"/><Stat label="Active Alerts" value={s.active_alerts||0} color={s.active_alerts>0?'#dc2626':'#10b981'}/><Stat label="Due Soon" value={stale.length} color={stale.length>5?'#f59e0b':'#0ea5e9'}/><Stat label="Events 24h" value={feed.filter(f=>new Date(f.created_at)>new Date(Date.now()-86400000)).length} color="#8b5cf6"/></div>{view==='grid'&&<div style={{overflowX:'auto'}}><div style={{display:'grid',gridTemplateColumns:`110px repeat(${DOMAINS.length},1fr)`,gap:2,minWidth:920}}><div/>{DOMAIN_SHORT.map(d=><div key={d} style={{padding:'6px 3px',fontSize:9,fontWeight:600,color:'#94a3b8',textAlign:'center',textTransform:'uppercase',letterSpacing:'.04em'}}>{d}</div>)}{FUNCTIONS.map(fn=><React.Fragment key={fn}><div style={{padding:'6px 8px',fontSize:11,fontWeight:600,color:'#cbd5e1',display:'flex',alignItems:'center'}}>{fn}</div>{DOMAINS.map(dn=>{const c=cellMap[`${fn}|${dn}`];if(!c)return <div key={`${fn}-${dn}`} style={{minHeight:42,border:'1px solid rgba(255,255,255,.03)',borderRadius:5,background:'rgba(255,255,255,.01)'}}/>;const rc=riskColor(c.risk_classification);const isSel=selected?.cell_id===c.cell_id;return <div key={c.cell_id} onClick={()=>setSelected(isSel?null:c)} style={{padding:'5px 6px',borderRadius:5,cursor:'pointer',position:'relative',minHeight:42,display:'flex',flexDirection:'column',justifyContent:'center',background:isSel?rc.bg:`${rc.bg}18`,border:`1px solid ${isSel?rc.bg:rc.bg+'40'}`,boxShadow:isSel?`0 0 12px ${rc.g}`:'none',transition:'all .15s'}}><div className="mono" style={{fontSize:8,fontWeight:700,color:isSel?rc.t:'#94a3b8'}}>{c.cell_id}</div><div style={{fontSize:9,color:isSel?rc.t:'#cbd5e1',lineHeight:1.2,marginTop:1}}>{(c.cell_title||'').slice(0,22)}</div>{c.automation_flag&&<div style={{position:'absolute',top:2,right:3,width:4,height:4,borderRadius:'50%',background:'#10b981'}}/>}{c.alert_active&&<div style={{position:'absolute',bottom:2,right:3,width:4,height:4,borderRadius:'50%',background:'#dc2626',animation:'p 2s infinite'}}/>}</div>})}</React.Fragment>)}</div></div>}{view!=='grid'&&<div style={{display:'grid',gap:4}}>{(view==='alerts'?alerts:view==='feed'?feed:view==='stale'?stale:view==='operational'?operational:view==='domains'?domainHealth:view==='research'?researchCov:filtered).map((x,i)=><pre key={i} style={{whiteSpace:'pre-wrap',fontSize:11,padding:10,borderRadius:6,background:'rgba(255,255,255,.025)',border:'1px solid rgba(255,255,255,.04)'}}>{JSON.stringify(x,null,2)}</pre>)}</div>}{selected&&<div style={{marginTop:16,padding:18,borderRadius:10,background:'rgba(255,255,255,.03)',border:`1px solid ${riskColor(selected.risk_classification).bg}35`}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><div><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}><span className="mono" style={{fontSize:13,fontWeight:700,color:riskColor(selected.risk_classification).bg}}>{selected.cell_id}</span><span style={{fontSize:15,fontWeight:600}}>{selected.cell_title}</span></div><div style={{fontSize:12,color:'#94a3b8'}}>{selected.function_name} → {selected.domain_name}</div></div><button onClick={()=>setSelected(null)} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:16,padding:4}}>✕</button></div>{selected.cell_description&&<div style={{fontSize:12,color:'#cbd5e1',marginTop:10,lineHeight:1.5}}>{selected.cell_description}</div>}<div style={{display:'flex',gap:6,marginTop:14}}><button onClick={()=>handleLogEvent(selected.cell_id,'review_completed','info',`Manual review: ${selected.cell_title}`)} style={{padding:'5px 12px',borderRadius:5,border:'1px solid rgba(16,185,129,.3)',background:'transparent',color:'#10b981',cursor:'pointer',fontSize:11}}>✓ Mark Reviewed</button><button onClick={()=>handleLogEvent(selected.cell_id,'threshold_breach','high',`Manual threshold flag: ${selected.cell_title}`)} style={{padding:'5px 12px',borderRadius:5,border:'1px solid rgba(245,158,11,.3)',background:'transparent',color:'#f59e0b',cursor:'pointer',fontSize:11}}>⚠ Flag Threshold</button><button onClick={()=>handleLogEvent(selected.cell_id,'escalation_triggered','critical',`Manual escalation: ${selected.cell_title}`)} style={{padding:'5px 12px',borderRadius:5,border:'1px solid rgba(220,38,38,.3)',background:'transparent',color:'#f87171',cursor:'pointer',fontSize:11}}>↑ Escalate</button></div></div>}</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
