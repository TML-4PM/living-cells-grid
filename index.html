<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Living Cells — Operating Grid</title>
<meta name="description" content="T4H Living Cells organisational telemetry grid"/>
<link rel="icon" type="image/png" sizes="32x32" href="https://lzfgigiyqpuuxslsygjt.supabase.co/storage/v1/object/public/images/t4h-icon.png"/>
<link rel="icon" type="image/x-icon" href="https://lzfgigiyqpuuxslsygjt.supabase.co/storage/v1/object/public/images/t4h-icon.ico"/>
<link rel="apple-touch-icon" href="https://lzfgigiyqpuuxslsygjt.supabase.co/storage/v1/object/public/images/t4h-icon.png"/>
<meta property="og:title" content="Living Cells — T4H Operating Grid"/>
<meta property="og:description" content="T4H Living Cells organisational telemetry grid"/>
<meta property="og:image" content="https://lzfgigiyqpuuxslsygjt.supabase.co/storage/v1/object/public/images/t4h-icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e17;color:#e2e8f0;font-family:'IBM Plex Sans',-apple-system,sans-serif;min-height:100vh}.mono{font-family:'JetBrains Mono',monospace}.brand{display:flex;gap:10px;align-items:center}.brandmark{width:28px;height:28px;border-radius:8px;background:#facc15;color:#0a0e17;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;letter-spacing:-.05em}.loading{display:flex;align-items:center;justify-content:center;height:100vh;gap:8px;font-size:13px;color:#64748b}.dot{width:6px;height:6px;border-radius:50%;background:#facc15;animation:p 1s ease-in-out infinite}.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}@keyframes p{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}.pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}.sev-critical{background:rgba(220,38,38,.2);color:#f87171;border:1px solid rgba(220,38,38,.3)}.sev-high{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}.sev-warning{background:rgba(234,179,8,.12);color:#facc15;border:1px solid rgba(234,179,8,.2)}.sev-info{background:rgba(14,165,233,.1);color:#38bdf8;border:1px solid rgba(14,165,233,.2)}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback}=React;
const FUNCTIONS=['Sense','Understand','Decide','Act','Verify','Secure','Coordinate','Improve','Govern'];
const DOMAINS=['Self','Family','Team','Org','Market','Government & Society','Infrastructure','Environment','Future'];
const DOMAIN_SHORT=['Self','Family','Team','Org','Market','Gov&Soc','Infra','Environ','Future'];
const API='/api/query?q=';const EVENT_API='/api/event';
async function fetchQ(key){const r=await fetch(API+key);const d=await r.json();return d.rows||[]}
const riskColor=r=>r==='Critical'?{bg:'#dc2626',t:'#fff',g:'rgba(220,38,38,.4)'}:r==='High'?{bg:'#f59e0b',t:'#000',g:'rgba(245,158,11,.3)'}:{bg:'#0ea5e9',t:'#fff',g:'rgba(14,165,233,.2)'};
function Stat({label,value,color}){return <div style={{textAlign:'center',padding:'12px 14px',background:'rgba(255,255,255,.03)',borderRadius:8,border:'1px solid rgba(255,255,255,.06)',minWidth:90}}><div className="mono" style={{fontSize:26,fontWeight:700,color}}>{value}</div><div style={{fontSize:10,color:'#94a3b8',marginTop:3,textTransform:'uppercase',letterSpacing:'.05em'}}>{label}</div></div>}
function App(){const[cells,setCells]=useState([]),[stats,setStats]=useState({}),[alerts,setAlerts]=useState([]),[feed,setFeed]=useState([]),[stale,setStale]=useState([]),[selected,setSelected]=useState(null),[view,setView]=useState('grid'),[loading,setLoading]=useState(true),[lastRefresh,setLastRefresh]=useState(null),[apiError,setApiError]=useState(null);
const load=useCallback(async()=>{setLoading(true);setApiError(null);try{const[c,s,al,fd,st]=await Promise.all([fetchQ('all_cells'),fetchQ('stats'),fetchQ('alerts'),fetchQ('feed'),fetchQ('stale')]);setCells(c);setStats(Array.isArray(s)?s[0]||{}:s);setAlerts(al);setFeed(fd);setStale(st);setLastRefresh(new Date())}catch(e){setApiError(e.message);console.error(e)}setLoading(false)},[]);useEffect(()=>{load()},[load]);
const cellMap=useMemo(()=>{const m={};cells.forEach(c=>{m[`${c.function_name}|${c.domain_name}`]=c});return m},[cells]);const s=stats;const VIEWS=['grid','alerts','feed','stale','risk'];
return <div style={{padding:'20px 24px',maxWidth:1480,margin:'0 auto'}}><div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}><div className="brand"><div className="brandmark">T4H</div><div><h1 style={{fontSize:22,fontWeight:700,letterSpacing:'-.02em'}}>Living Cells</h1><p style={{fontSize:12,color:'#64748b',marginTop:3}}>T4H · 9×9 Operating Grid{lastRefresh&&<span style={{marginLeft:10,fontSize:11}}>⟳ {lastRefresh.toLocaleTimeString()}</span>}</p></div></div><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{VIEWS.map(v=><button key={v} onClick={()=>setView(v)} style={{padding:'5px 12px',borderRadius:5,border:'1px solid',fontSize:11,fontWeight:600,cursor:'pointer',textTransform:'capitalize',borderColor:view===v?'#facc15':'rgba(255,255,255,.08)',background:view===v?'rgba(250,204,21,.13)':'transparent',color:view===v?'#facc15':'#94a3b8'}}>{v}</button>)}<button onClick={load} disabled={loading} style={{padding:'5px 10px',borderRadius:5,border:'1px solid rgba(255,255,255,.08)',fontSize:11,cursor:'pointer',background:'transparent',color:loading?'#475569':'#94a3b8'}}>↻</button></div></div>{apiError&&<div style={{padding:10,border:'1px solid rgba(245,158,11,.3)',background:'rgba(245,158,11,.08)',borderRadius:8,marginBottom:14,fontSize:12,color:'#fbbf24'}}>API not fully wired: {apiError}. UI shell is live; data runtime needs tables/views/API handlers.</div>}<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:6,marginBottom:20}}><Stat label="Cells" value={s.total_cells||cells.length||81} color="#e2e8f0"/><Stat label="Critical" value={s.critical||0} color="#dc2626"/><Stat label="High" value={s.high||0} color="#f59e0b"/><Stat label="Auto %" value={s.auto_pct?s.auto_pct+'%':'—'} color="#10b981"/><Stat label="Active Alerts" value={s.active_alerts||0} color={s.active_alerts>0?'#dc2626':'#10b981'}/><Stat label="Due Soon" value={stale.length} color={stale.length>5?'#f59e0b':'#0ea5e9'}/><Stat label="Events" value={feed.length} color="#8b5cf6"/></div>{view==='grid'&&<div style={{overflowX:'auto'}}><div style={{display:'grid',gridTemplateColumns:`110px repeat(${DOMAINS.length},1fr)`,gap:2,minWidth:920}}><div/>{DOMAIN_SHORT.map(d=><div key={d} style={{padding:'6px 3px',fontSize:9,fontWeight:600,color:'#94a3b8',textAlign:'center',textTransform:'uppercase',letterSpacing:'.04em'}}>{d}</div>)}{FUNCTIONS.map(fn=><React.Fragment key={fn}><div style={{padding:'6px 8px',fontSize:11,fontWeight:600,color:'#cbd5e1',display:'flex',alignItems:'center'}}>{fn}</div>{DOMAINS.map(dn=>{const c=cellMap[`${fn}|${dn}`];if(!c)return <div key={`${fn}-${dn}`} style={{minHeight:42,border:'1px solid rgba(255,255,255,.03)',borderRadius:5,background:'rgba(255,255,255,.01)'}}/>;const rc=riskColor(c.risk_classification);return <div key={c.cell_id} onClick={()=>setSelected(c)} style={{padding:'5px 6px',borderRadius:5,cursor:'pointer',minHeight:42,background:`${rc.bg}18`,border:`1px solid ${rc.bg}40`}}><div className="mono" style={{fontSize:8,fontWeight:700,color:'#94a3b8'}}>{c.cell_id}</div><div style={{fontSize:9,color:'#cbd5e1',lineHeight:1.2,marginTop:1}}>{(c.cell_title||'').slice(0,22)}</div></div>})}</React.Fragment>)}</div></div>}{view!=='grid'&&<div style={{display:'grid',gap:4}}>{(view==='alerts'?alerts:view==='feed'?feed:view==='stale'?stale:cells).map((x,i)=><pre key={i} style={{whiteSpace:'pre-wrap',fontSize:11,padding:10,borderRadius:6,background:'rgba(255,255,255,.025)',border:'1px solid rgba(255,255,255,.04)'}}>{JSON.stringify(x,null,2)}</pre>)}</div>}{selected&&<div style={{marginTop:16,padding:18,borderRadius:10,background:'rgba(255,255,255,.03)',border:'1px solid rgba(250,204,21,.25)'}}><button onClick={()=>setSelected(null)} style={{float:'right',background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:16}}>✕</button><div className="mono" style={{fontSize:13,fontWeight:700,color:'#facc15'}}>{selected.cell_id}</div><div style={{fontSize:15,fontWeight:600}}>{selected.cell_title}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>{selected.function_name} → {selected.domain_name}</div><div style={{fontSize:12,color:'#cbd5e1',marginTop:10,lineHeight:1.5}}>{selected.cell_description}</div></div>}</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
